<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <!-- import jQuery -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=playing_cards"
    />
    <script src="index.js" defer></script>
  </head>

  <body data-theme="dark">
    <header>
      <div class="header-inner">
        <div class="logo">Pokemon <span>Memory</span></div>
        <div class="control">
          <select id="difficulty">
            <option value="easy">🟢 Easy (8 pairs / 40s)</option>
            <option value="medium" selected>🟡 Medium (12 pairs / 80s)</option>
            <option value="hard">🔴 Hard (16 pairs / 120s)</option>
          </select>
          <button class="btn btn-start" id="btn-start">▶︎ Start</button>
          <button class="btn btn-reset" id="btn-reset">↻ Reset</button>
          <button
            class="btn btn-powerup"
            id="btn-powerup"
            disabled
            title="Peek all cards for 3 seconds"
          >
            👁 Peek
          </button>
          <button class="btn btn-theme" id="btn-theme" title="Toggle theme">
            Dark
          </button>
        </div>
      </div>
    </header>

    <div class="stats-bar" id="stats-bar" style="display: none">
      <div class="stat-chip timer" id="chip-timer">
        <span class="stat-label">Time left</span>
        <span class="stat-value" id="stat-time">--</span>
      </div>
      <div class="stat-chip">
        <span class="stat-label">Clicks</span>
        <span class="stat-value" id="stat-clicks">0</span>
      </div>
      <div class="stat-chip">
        <span class="stat-label">Matched</span>
        <span class="stat-value" id="stat-matched">0</span>
      </div>
      <div class="stat-chip">
        <span class="stat-label">Remaining</span>
        <span class="stat-value" id="stat-left">0</span>
      </div>
      <div class="stat-chip">
        <span class="stat-label">Total Pairs</span>
        <span class="stat-value" id="stat-total">0</span>
      </div>
    </div>

    <main>
      <div id="idle-msg">
        <div class="idle-icon">
          <span class="material-symbols-outlined" style="font-size: 48px">
            playing_cards
          </span>
        </div>
        <h2>POKÉMON<br />MEMORY GAME</h2>
        <p>Choose a difficulty and press <strong>Start</strong> to begin!</p>
        <p style="margin-top: 12px; font-size: 13px">
          Match all Pokémon pairs before time runs out.
        </p>
      </div>
      <div id="loading">
        <div class="spinner"></div>
        <p>Catching Pokémon…</p>
      </div>
      <div class="card-grid" id="card-grid"></div>
    </main>

    <div id="peek-bar">👁 Peeking… <span id="peek-count">3</span>s</div>

    <div id="overlay">
      <div class="overlay-box" id="overlay-box">
        <div class="overlay-emoji" id="overlay-emoji">🏆</div>
        <div class="overlay-title" id="overlay-title">YOU WIN!</div>
        <div class="overlay-sub" id="overlay-sub"></div>
        <button class="btn btn-start" id="overlay-play-again">
          ▶ Play Again
        </button>
        <button class="btn btn-reset" id="overlay-change">
          Change Difficulty
        </button>
      </div>
    </div>
  </body>
</html>
